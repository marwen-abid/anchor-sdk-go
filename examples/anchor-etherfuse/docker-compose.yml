services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: anchor
      POSTGRES_PASSWORD: anchor
      POSTGRES_DB: anchor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anchor"]
      interval: 2s
      timeout: 3s
      retries: 5

  anchor:
    build:
      context: ../..
      dockerfile: examples/anchor-etherfuse/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      STORE_TYPE: postgres
      DATABASE_URL: postgres://anchor:anchor@postgres:5432/anchor?sslmode=disable
      ANCHOR_DOMAIN: localhost:8000
      ANCHOR_PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
