name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  integration-basic:
    name: Integration (basic-anchor)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Start basic-anchor server
        run: go run ./examples/basic-anchor &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/.well-known/stellar.toml > /dev/null 2>&1; then
              echo "Server is up"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Run anchor-tests
        continue-on-error: true
        run: |
          docker run --rm --network host stellar/anchor-tests:latest \
            --home-domain http://localhost:8000 --seps 1 10 24

  integration-etherfuse:
    name: Integration (anchor-etherfuse)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Start anchor-etherfuse server
        env:
          ETHERFUSE_API_KEY: ${{ secrets.ETHERFUSE_API_KEY }}
          ANCHOR_PORT: "8001"
          ANCHOR_DOMAIN: "localhost:8001"
        run: go run ./examples/anchor-etherfuse &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/.well-known/stellar.toml > /dev/null 2>&1; then
              echo "Server is up"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Run anchor-tests
        run: |
          docker run --rm --network host stellar/anchor-tests:latest \
            --home-domain http://localhost:8001 --seps 1 10 24
